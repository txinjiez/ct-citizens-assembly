<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign In — Connecticut Citizens' Assembly</title>
<link rel="icon" type="image/png" href="media/ctca-logo.png" />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Public+Sans:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900&display=swap" rel="stylesheet" />
<style>
  :root {
    --navy: #1a237e;
    --navy-dark: #0d1757;
    --navy-light: #283593;
    --purple: #7b2d8b;
    --magenta: #c2185b;
    --orange: #e64a19;
    --yellow: #f9a825;
    --coral: #ef5350;
    --maroon: #880e4f;
    --white: #ffffff;
    --off-white: #f8f9fd;
    --gray-light: #eef0f8;
    --gray-mid: #c5cae9;
    --gray-text: #5c6bc0;
    --text: #1a237e;
    --red: #dc2626;
    --green: #16a34a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'Public Sans', sans-serif;
    color: var(--text);
    min-height: 100vh;
    background: linear-gradient(135deg, var(--navy-dark) 0%, var(--purple) 100%);
  }

  /* NAV */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: rgba(255,255,255,0.97);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2.5rem;
    height: 70px;
    box-shadow: 0 2px 20px rgba(0,0,0,0.1);
    border-bottom: 4px solid transparent;
    border-image: linear-gradient(to right, #7b2d8b, #c2185b, #e64a19, #f9a825, #ef5350) 1;
  }

  .nav-logo img { height: 62px; display: block; }

  .nav-links {
    display: flex;
    gap: 2rem;
    list-style: none;
    align-items: center;
  }

  .nav-links a {
    color: var(--navy);
    text-decoration: none;
    font-size: 0.95rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .nav-links a:hover { color: var(--purple); }

  .nav-cta {
    background: var(--navy-dark);
    color: var(--white) !important;
    padding: 0.5rem 1.2rem;
    border-radius: 4px;
    font-weight: 700 !important;
  }

  .nav-cta:hover { background: var(--purple) !important; color: var(--white) !important; }

  /* AUTH PAGE */
  .auth-page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 7rem 1.5rem 3rem;
  }

  .auth-card {
    background: white;
    border-radius: 16px;
    padding: 3rem;
    width: 100%;
    max-width: 460px;
    box-shadow: 0 24px 60px rgba(0,0,0,0.3);
  }

  .auth-header {
    text-align: center;
    margin-bottom: 2rem;
  }

  .auth-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    color: var(--navy-dark);
    margin-bottom: 0.3rem;
  }

  .auth-header p {
    font-size: 0.88rem;
    color: var(--gray-text);
  }

  /* TABS */
  .auth-tabs {
    display: flex;
    border-bottom: 2px solid var(--gray-mid);
    margin-bottom: 2rem;
  }

  .auth-tab {
    flex: 1;
    padding: 0.75rem;
    background: none;
    border: none;
    font-family: 'Public Sans', sans-serif;
    font-size: 0.88rem;
    font-weight: 700;
    color: var(--gray-text);
    cursor: pointer;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
    transition: color 0.2s;
  }

  .auth-tab.active {
    color: var(--navy-dark);
    border-bottom-color: var(--magenta);
  }

  /* FORM */
  .auth-form { display: flex; flex-direction: column; gap: 1.1rem; }

  .form-group { display: flex; flex-direction: column; gap: 0.4rem; }

  .form-group label {
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--navy-dark);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .form-group input {
    padding: 0.8rem 1rem;
    border: 1.5px solid var(--gray-mid);
    border-radius: 6px;
    font-family: 'Public Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--text);
    background: white;
    outline: none;
    transition: border-color 0.2s;
  }

  .form-group input:focus { border-color: var(--navy); }

  .btn-auth {
    background: var(--navy-dark);
    color: white;
    border: none;
    padding: 0.9rem;
    border-radius: 6px;
    font-family: 'Public Sans', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    margin-top: 0.4rem;
    letter-spacing: 0.02em;
    width: 100%;
    transition: background 0.2s;
  }

  .btn-auth:hover { background: var(--purple); }
  .btn-auth:disabled { opacity: 0.6; cursor: not-allowed; }

  .auth-message {
    padding: 0.8rem 1rem;
    border-radius: 6px;
    font-size: 0.88rem;
    font-weight: 600;
    display: none;
  }

  .auth-message.error {
    background: #fef2f2;
    color: var(--red);
    border: 1px solid #fecaca;
    display: block;
  }

  .auth-message.success {
    background: #f0fdf4;
    color: var(--green);
    border: 1px solid #bbf7d0;
    display: block;
  }

  .hidden { display: none !important; }

  @media (max-width: 500px) {
    .auth-card { padding: 2rem 1.5rem; }
    nav { padding: 0 1.2rem; }
    .nav-links { gap: 0.8rem; font-size: 0.82rem; }
  }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">
    <a href="index.html"><img src="media/CTCA-honeycomb.png" alt="Connecticut Citizens' Assembly" /></a>
  </div>
  <ul class="nav-links">
    <li><a href="index.html#about">About</a></li>
    <li><a href="index.html#roadmap">Roadmap</a></li>
    <li><a href="index.html#timeline">Timeline</a></li>
    <li><a href="resources.html">Resources</a></li>
    <li><a href="team.html">Team</a></li>
    <li><a href="index.html#contact" class="nav-cta">Support the Assembly</a></li>
  </ul>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <h2>Member Portal</h2>
      <p>Connecticut Citizens' Assembly</p>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('signin')">Sign In</button>
    </div>

    <!-- SIGN IN -->
    <div id="signin-form">
      <div class="auth-form">
        <div id="signin-message" class="auth-message"></div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="signin-email" placeholder="jane@example.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="signin-password" placeholder="••••••••" />
        </div>
        <button class="btn-auth" id="signin-btn" onclick="signIn()">Sign In →</button>
      </div>
    </div>

    <!-- REGISTER -->
    <div id="register-form" class="hidden">
      <div class="auth-form">
        <div id="register-message" class="auth-message"></div>
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="reg-name" placeholder="Jane Smith" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="reg-email" placeholder="jane@example.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="reg-password" placeholder="At least 8 characters" />
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="reg-confirm" placeholder="Re-enter password" />
        </div>
        <button class="btn-auth" id="register-btn" onclick="register()">Create Account →</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script>
  // Redirect if already logged in
  db.auth.getSession().then(({ data: { session } }) => {
    if (session) window.location.href = 'dashboard.html';
  });

  function switchTab(tab) {
    const isSignin = tab === 'signin';
    document.querySelectorAll('.auth-tab').forEach((t, i) => {
      t.classList.toggle('active', isSignin ? i === 0 : i === 1);
    });
    document.getElementById('signin-form').classList.toggle('hidden', !isSignin);
    document.getElementById('register-form').classList.toggle('hidden', isSignin);
  }

  function showMessage(id, msg, type) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.className = 'auth-message ' + type;
  }

  async function signIn() {
    const email = document.getElementById('signin-email').value.trim();
    const password = document.getElementById('signin-password').value;
    const btn = document.getElementById('signin-btn');

    if (!email || !password) {
      showMessage('signin-message', 'Please fill in all fields.', 'error');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Signing in…';

    const { error } = await db.auth.signInWithPassword({ email, password });

    if (error) {
      showMessage('signin-message', error.message, 'error');
      btn.disabled = false;
      btn.textContent = 'Sign In →';
    } else {
      window.location.href = 'dashboard.html';
    }
  }

  async function register() {
    const name = document.getElementById('reg-name').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    const confirm = document.getElementById('reg-confirm').value;
    const btn = document.getElementById('register-btn');

    if (!name || !email || !password || !confirm) {
      showMessage('register-message', 'Please fill in all fields.', 'error');
      return;
    }
    if (password.length < 8) {
      showMessage('register-message', 'Password must be at least 8 characters.', 'error');
      return;
    }
    if (password !== confirm) {
      showMessage('register-message', 'Passwords do not match.', 'error');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Creating account…';

    const { error } = await db.auth.signUp({
      email,
      password,
      options: { data: { full_name: name } }
    });

    if (error) {
      showMessage('register-message', error.message, 'error');
    } else {
      showMessage('register-message', 'Account created! Check your email to confirm your address, then sign in.', 'success');
    }

    btn.disabled = false;
    btn.textContent = 'Create Account →';
  }

  document.addEventListener('keydown', (e) => {
    if (e.key !== 'Enter') return;
    const signinHidden = document.getElementById('signin-form').classList.contains('hidden');
    if (!signinHidden) signIn(); else register();
  });
</script>
</body>
</html>
